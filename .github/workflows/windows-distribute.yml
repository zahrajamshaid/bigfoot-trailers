name: Windows — Build & Package

# Manual trigger. Produces a portable ZIP (always) and, when a signing cert
# secret is configured, a signed MSIX installer. Both are uploaded as workflow
# artifacts you can hand to the client.
#
# GitHub's windows-latest runner ships a full Visual Studio with the C++ ATL
# component, so the local atlstr.h workaround (see DESKTOP-WINDOWS-PROGRESS.md)
# is NOT needed here.
on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes (informational)'
        required: false
        default: 'Build from GitHub Actions'

env:
  FLUTTER_VERSION: 3.32.8
  # The hosted backend the desktop client talks to. Override by setting the
  # repo variable DESKTOP_API_HOST.
  API_HOST: ${{ vars.DESKTOP_API_HOST || 'bigfoot-trailers.duckdns.org' }}

jobs:
  build_windows:
    name: Build Windows release + package
    runs-on: windows-latest
    timeout-minutes: 40

    defaults:
      run:
        working-directory: bigfoot_mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # Flutter 3.32.8's Windows desktop build invokes CMake with
      # `-G "Visual Studio 16 2019"` (older bundled CMake doesn't know VS 17).
      # The windows-latest runner only ships VS 2022, so the build fails with
      # "could not find any instance of Visual Studio". Installing VS 2019
      # build tools satisfies that lookup; we add the ATL component because
      # bigfoot_mobile's MSIX plugin pulls atlstr.h transitively.
      - name: Install Visual Studio 2019 Build Tools (+ ATL)
        shell: pwsh
        run: |
          choco install visualstudio2019buildtools `
            --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --add Microsoft.VisualStudio.Component.VC.ATL --add Microsoft.VisualStudio.Component.VC.ATLMFC --includeRecommended" `
            -y --no-progress

      - name: Bump build number from CI run number
        shell: bash
        run: |
          BASE_VERSION=$(grep -E '^version:' pubspec.yaml | awk '{print $2}' | cut -d+ -f1 | tr -d '\r\n ')
          sed -i.bak "s/^version:.*/version: ${BASE_VERSION}+${{ github.run_number }}/" pubspec.yaml
          rm pubspec.yaml.bak
          echo "Building ${BASE_VERSION}+${{ github.run_number }}"

      - name: flutter pub get
        run: flutter pub get

      - name: Build Windows release
        run: >
          flutter build windows --release
          --dart-define=FLAVOR=production
          --dart-define=API_BASE_URL=https://${{ env.API_HOST }}/v1
          --dart-define=WS_URL=wss://${{ env.API_HOST }}/ws

      - name: Package portable ZIP
        shell: pwsh
        run: |
          $src = "build/windows/x64/runner/Release"
          $zip = "build/BigfootTrailers-portable-${{ github.run_number }}.zip"
          Compress-Archive -Path "$src/*" -DestinationPath $zip -Force
          "Portable ZIP: $zip"

      - name: Restore MSIX signing certificate (if configured)
        id: cert
        shell: pwsh
        env:
          PFX_B64: ${{ secrets.WINDOWS_MSIX_PFX_BASE64 }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PFX_B64)) {
            "has_cert=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "No WINDOWS_MSIX_PFX_BASE64 secret — skipping MSIX."
          } else {
            New-Item -ItemType Directory -Force -Path windows/packaging | Out-Null
            [IO.File]::WriteAllBytes("windows/packaging/bigfoot_trailers.pfx", [Convert]::FromBase64String($env:PFX_B64))
            "has_cert=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Build MSIX installer
        if: steps.cert.outputs.has_cert == 'true'
        env:
          MSIX_PASSWORD: ${{ secrets.WINDOWS_MSIX_PASSWORD }}
        run: dart run msix:create --certificate-password "%MSIX_PASSWORD%"

      - name: Upload portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: bigfoot-windows-portable-${{ github.run_number }}
          path: bigfoot_mobile/build/BigfootTrailers-portable-${{ github.run_number }}.zip
          if-no-files-found: error
          retention-days: 14

      - name: Upload MSIX installer
        if: steps.cert.outputs.has_cert == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: bigfoot-windows-msix-${{ github.run_number }}
          path: bigfoot_mobile/build/windows/x64/runner/Release/*.msix
          if-no-files-found: warn
          retention-days: 14

      - name: Clean up signing key on disk
        if: always()
        shell: pwsh
        run: Remove-Item windows/packaging/bigfoot_trailers.pfx -Force -ErrorAction SilentlyContinue
