name: API · Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'bigfoot-api/**'
      - '.github/workflows/api-deploy.yml'
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip lint/test (emergency hotfix only)'
        type: boolean
        default: false

concurrency:
  group: api-deploy-prod
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/bigfoot-api

jobs:
  # ---------------------------------------------------------------------------
  # 1. Lint + unit tests must pass before anything is built or pushed.
  # ---------------------------------------------------------------------------
  test:
    name: Lint & Test
    if: ${{ inputs.skip_tests != true }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bigfoot-api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bigfoot-api/package-lock.json

      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate
      - run: npm run lint
      - run: npm test -- --ci

  # ---------------------------------------------------------------------------
  # 2. Build the Docker image and push to GitHub Container Registry.
  #    Tagged with both `latest` and the commit SHA for rollback.
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Image
    needs: test
    if: ${{ always() && (needs.test.result == 'success' || inputs.skip_tests == true) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: bigfoot-api
          file: bigfoot-api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # 3. SSH into the droplet, pull the new image, restart the stack,
  #    verify the /health endpoint comes back green.
  #    Uses GitHub Environments — turn on "Required reviewers" in repo settings
  #    if you want manual approval before each production deploy.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://${{ vars.DEPLOY_DOMAIN }}
    steps:
      - name: Sync compose + Caddyfile to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: 'bigfoot-api/docker-compose.prod.yml,bigfoot-api/Caddyfile'
          target: '/opt/bigfoot'
          strip_components: 0
          overwrite: true

      - name: Pull image, restart, verify
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          envs: GITHUB_SHA,GHCR_TOKEN,GHCR_USER
          script: |
            set -euo pipefail
            cd /opt/bigfoot/bigfoot-api

            echo "→ Logging in to GHCR..."
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

            echo "→ Pulling sha-${GITHUB_SHA}..."
            export IMAGE_TAG="sha-${GITHUB_SHA}"
            docker compose --env-file /opt/bigfoot/.env.production \
              -f docker-compose.prod.yml pull api

            echo "→ Restarting stack..."
            docker compose --env-file /opt/bigfoot/.env.production \
              -f docker-compose.prod.yml up -d --remove-orphans

            echo "→ Cleaning up old images..."
            docker image prune -f

            echo "→ Recording deployed SHA for rollback..."
            echo "${GITHUB_SHA}" > /opt/bigfoot/.deployed-sha
        env:
          GITHUB_SHA: ${{ github.sha }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_USER: ${{ github.actor }}

      - name: Health check
        run: |
          set -e
          for i in $(seq 1 30); do
            if curl -fsS "https://${{ vars.DEPLOY_DOMAIN }}/health" > /dev/null; then
              echo "✓ API healthy at https://${{ vars.DEPLOY_DOMAIN }}/health"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 5
          done
          echo "✗ Health check failed after 150s"
          exit 1
