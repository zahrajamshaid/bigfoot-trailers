name: Android — Build & Distribute

# Manual trigger by default. Uncomment the `push:` block below if you want
# every push to main to auto-distribute to employees.
on:
  workflow_dispatch:
    inputs:
      release_notes:
        description: 'Release notes (visible in Firebase App Distribution)'
        required: false
        default: 'Build from GitHub Actions'
  # push:
  #   branches: [main]
  #   paths:
  #     - 'bigfoot_mobile/**'
  #     - '.github/workflows/android-distribute.yml'

env:
  FLUTTER_VERSION: 3.32.8
  # Production API host — single source of truth is the repo variable
  # DEPLOY_DOMAIN (also used by .github/workflows/api-deploy.yml).
  API_HOST: ${{ vars.DEPLOY_DOMAIN }}
  FIREBASE_APP_ID: 1:563599327933:android:3c1e17a4ee640492d0add4
  TESTER_GROUPS: employees

jobs:
  build_and_distribute:
    name: Build APK + distribute via Firebase App Distribution
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: bigfoot_mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Stamp version 1.0.0 + CI build number
        # Marketing version (versionName) is pinned to 1.0.0 for phone
        # Firebase distributions — desktop releases use their own version
        # stream out of pubspec, so we override here instead of mutating
        # pubspec globally. versionCode (the build number, right of `+`)
        # is the CI run number, kept in lock-step with iOS for sanity.
        run: |
          MARKETING_VERSION=1.0.0
          BUILD_NUMBER=${{ github.run_number }}
          sed -i.bak "s/^version:.*/version: ${MARKETING_VERSION}+${BUILD_NUMBER}/" pubspec.yaml
          rm pubspec.yaml.bak
          echo "Building ${MARKETING_VERSION}+${BUILD_NUMBER}"

      - name: Restore upload keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo -n "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          test -s android/app/upload-keystore.jks || { echo "Keystore is empty"; exit 1; }

      - name: Restore key.properties
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD:   ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS:      ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=../app/upload-keystore.jks
          EOF

      - name: flutter pub get
        run: flutter pub get

      - name: Build APK (production, arm64-v8a)
        run: |
          flutter build apk --release \
            --flavor production \
            --target-platform android-arm64 \
            --split-per-abi \
            --no-tree-shake-icons \
            --dart-define=FLAVOR=production \
            --dart-define=API_BASE_URL=https://${{ env.API_HOST }}/v1 \
            --dart-define=WS_URL=wss://${{ env.API_HOST }}/ws \
            -t lib/main.dart

      - name: Locate APK
        id: apk
        run: |
          APK_PATH=$(ls bigfoot_mobile/build/app/outputs/flutter-apk/app-arm64-v8a-production-release.apk)
          echo "Found $APK_PATH"
          echo "apk_path=$APK_PATH" >> "$GITHUB_OUTPUT"
        working-directory: ${{ github.workspace }}

      - name: Upload to Firebase App Distribution
        # Swapped off the bare `firebase appdistribution:distribute` CLI
        # call: the latest firebase-tools removed (or never had) the
        # `--service-credentials-file` flag we tried before, which left
        # the upload step bouncing on "Failed to authenticate" / "unknown
        # option". wzieba/Firebase-Distribution-Github-Action takes the
        # raw service-account JSON straight from the secret, so we skip
        # the CLI auth dance entirely.
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ env.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          groups: ${{ env.TESTER_GROUPS }}
          file: ${{ steps.apk.outputs.apk_path }}
          releaseNotes: ${{ github.event.inputs.release_notes || format('Auto build {0} from commit {1}', github.run_number, github.sha) }}

      - name: Upload APK as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.run_number }}
          path: bigfoot_mobile/build/app/outputs/flutter-apk/app-arm64-v8a-production-release.apk
          if-no-files-found: warn
          retention-days: 14

      - name: Clean up secrets on disk
        if: always()
        run: |
          rm -f android/key.properties android/app/upload-keystore.jks
