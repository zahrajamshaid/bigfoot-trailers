name: DB · Seed (manual)

# Manual-only — runs the base seed script (locations, models, departments,
# workflow templates, dev/staff user accounts) against the production
# Managed Postgres on the droplet. Idempotent: every upsert is keyed on
# stable columns (email, code, etc.) so re-running never duplicates rows.
#
# Trigger via GitHub UI (Actions → "DB · Seed (manual)" → Run workflow)
# or via CLI:
#   gh workflow run "DB · Seed (manual)" --repo <owner>/<repo> --ref main \
#     --field script=seed
on:
  workflow_dispatch:
    inputs:
      script:
        description: 'Which seed to run'
        required: true
        type: choice
        default: seed
        options:
          - seed                  # base: locations, models, depts, users
          - seed-trailer-catalog  # extra trailer models + ready-for-delivery trailers
          - seed-test-trailers    # 6 test trailers for batch-delivery testing
          - seed-open-mul         # 25 open-stock packing-slip trailers (PDFs uploaded if DO_SPACES_* set)
          - seed-open-mul-restock # normalize the open-mul 25 into Mulberry stock inventory (clears notes, status=delivered)
          - backfill-stuck-stock-status # one-shot: fix trailers stuck in ready_for_delivery after a sold → available revert
          - seed-inventory-models-and-sales # 3 inventory-only models (Triple Crown / Enclosed / Misc) + 2 sales logins (TAL / ATL)
          - seed-open-stock       # 93 multi-location open-stock trailers (MUL/JAX/ATL/TAL/TAP) — extends seed-open-mul to all 5 yards
          - seed-sold-and-delivery # 43 sold-pending-pickup + scheduled deliveries (factory_pickup / stack_to_location / stack_to_dealer → Tropic Trailers)
          - seed-production-queue # 44 trailers dropped into production at jig (step 1) or finish (step 3) per source folder
          - seed-prep-queue # 50 trailers into prep workflow (wood 11 / wire-hydro 9 / paint-prep 5) + ENCLOSED inventory, with customer/stock detection from PDF shipTo
          - backfill-size-ft-suffix # one-shot: strip trailing "ft" from trailers.size_ft so UI doesn't render "ftft"
          - backfill-inventory-size-ft # one-shot: populate sizeFt on in-inventory trailers from seeded PDF JSONs
          - stats-trailers # read-only: tally trailers across lifecycle / stock yards / series
          - backfill-paint-b-25ft # one-shot: reroute existing ≥25ft trailers from PAINT_A → PAINT_B (legacy)
          - backfill-paint-b-20ft # one-shot: reroute existing ≥20ft trailers from PAINT_A → PAINT_B (waiting + active only)
          - fix-clear-trailer-6868-priority # one-shot: reset SO 6868's globalPriority 1 → 9999 default
          - seed-parts-user # new `parts` role + parts@bigfoot.dev login covering all 4 jig departments
          - fix-trailer-6770-yeti # one-shot: reroute SO 6770's production steps to YETI departments after model swap
          - seed-gn-yeti-model # new gooseneck_yeti series + GN_YETI model (GN workflow with YETI_FIN at step 3)
          - apply-option-accountability # one-shot: trailer_addon_departments + trailer_addons provenance/PM-review columns (additive)
          - apply-sales-order-deposit # one-shot: sales_orders deposit columns (amount/paid_at/method/qbo_payment_id) — additive
          - apply-sales-order-accepted-status # one-shot: add 'accepted' to sales_order_status_enum + relabel converted rows
          - seed-cxp-models # new cxp series + 10 CXP / 14K CXP models (gooseneck workflow 1-for-1, incl. GN_FIN + QC_2 bypass and PAINT_B default)
          - seed-backfill-sold-at # one-shot: fill trailers.sold_at for already-sold trailers from audit_log (falls back to createdAt for born-sold cases). Needed once after the sold_at column ships so Health Check → Sales reads history correctly.
          - seed-fix-va-semi-arrival # one-shot: move 5 trailers (6361, 6417, 6586, 6743, 6777) from MULBERRY → TAPPAHANNOCK to reflect the 2026-06-22 semi shipment that never got marked. Flips status delivered→ready_for_delivery on the four that were prematurely closed.
          - seed-fix-va-reconcile-2 # one-shot: VA yard reconciliation round 2. 6698 back to ready (BODNER pickup); 6911 → VA + sold to "A and R Septic Brett"; 6658/6783/6784/6785/6866 → delivered (customer picked up).
          - seed-fix-va-revert-delivered # one-shot: undo the delivered flip for 6658/6783/6784/6785/6866. Operator clarified they're still at VA waiting on their buyers; keep them ready_for_delivery + sold.
          - seed-fix-delivered-null-destination # one-shot: backfill destinationLocationId on stack-to-yard deliveries that were delivered with NULL destination (they were invisible in yard inventory). Uses trailer.intendedStockLocationId as the fallback.
          - seed-fix-va-unsold # one-shot: revert 6875/6911/6781 back to open stock at VA (clear sale + soldAt + soldToName + customer); move 6875 MULBERRY → TAPPAHANNOCK.
          - seed-fix-6781-status # one-shot: flip SO 6781 back to ready_for_delivery (its status got flipped to delivered mid-reconciliation).
          - seed-fix-va-batch-2026-07-07 # one-shot: 2026-07-07 VA batch — unstick 6924/6859/6860/6659/6742/6779/6768 (close open steps + ready_for_delivery); reconcile 6862 → VA + turn ghost delivery #284 into a delivered stack-to-VA record; flip 6781 delivered → ready.
          - seed-fix-mul-openstock # one-shot: 2026-07-07 Mulberry open-stock reconcile — clear phantom "Hi Low" sale on 6770 + unstick 6893 (in_production sale_pending → ready_for_delivery available).
          - seed-fix-mul-sold-rtg # one-shot: 2026-07-07 Mulberry SOLD RTG reconcile — mark 6659→Back Acre + 6912→A&R SEPTIC sold; unstick 6881 (in_production → ready_for_delivery, sale already correct as AC SCHULTES).
          - seed-fix-6862-back-to-mul # one-shot: move SO 6862 currentLocation TAPPAHANNOCK → MULBERRY per operator's final confirmation that it's physically at Mulberry.
          - seed-fix-6588-status # one-shot: flip SO 6588 delivered → ready_for_delivery after the sale-pending→delivered regression. Still at VA, sold to Elevated Ag Solution.
          - backfill-qb-so-date # one-shot: pull "Date:" off attached PDFs for pending/in-production trailers
          - fix-trailers-to-wood # one-shot: jump SO 6702 + 6704 to WOOD (step 11)
          - seed-wood-install-fenders # add "Install fenders" to the WOOD worker checklist
          - seed-paint-b-checklists # mirror PAINT_A xp/yeti/deck_over checklist items onto PAINT_B
          - seed-jig-queue-low-enum # one-shot: ALTER TYPE notification_type_enum ADD 'jig_queue_low'
          - fix-trailer-6580-to-hydraulics # one-shot: move SO 6580's step-9 from WIRE → HYDRAULICS
          - backfill-over-24ft-to-hydraulics # one-shot: reroute waiting WIRE step-9 → HYDRAULICS for non-gooseneck trailers >24ft
          - seed-jig-coupler-checks # add "Correct coupler installed" check to every jig dept (worker self-check) + QC_1 (inspection)
          - fix-parts-b-role # one-shot: set parts_b@bigfoot.dev role from `worker` to `parts`
          - apply-scheduled-date-column # one-shot: ALTER TABLE deliveries ADD scheduled_date DATE (idempotent)
          - apply-system-announcements-tables # one-shot: create system_announcements + acks tables (idempotent)
          - fix-batches-back-to-building # one-shot: flip scheduled batches with no dispatched deliveries → building so the deployed app shows Edit
          - skip-gn-fin-for-inflight # one-shot: auto-complete GN_FIN + QC_2 on in-flight goosenecks, advance to PAINT_PREP
          - fix-mulberry-open-stock-and-6567 # one-shot: normalise 7 Mulberry open-stock trailers + move SO 6567 → Virginia
          - apply-trailer-intended-stock-location # one-shot: ALTER TABLE trailers ADD intended_stock_location_id (idempotent)
          - fix-stock-builds-route-via-mulberry # one-shot: move in-flight stock builds back to Mulberry, preserve destination in intended_stock_location_id
          - fix-stuck-batches-reconcile # one-shot: flip batches w/ all-terminal deliveries from scheduled → complete (e.g. OPEN-BATCH-TROPIC)
          - fix-so-test-pickup-delivery # one-shot: back-fill the missing factory_pickup row for SO TEST so both legs show in Completed Deliveries
          - fix-open-stock-status-revert # one-shot: flip mis-encoded open-stock trailers (status=delivered + saleStatus=available + isStockBuild) back to ready_for_delivery so they reappear in Stock Inventory (incl. TAL)
          - fix-ghost-delivered-trailers-backfill # one-shot: insert missing stack_to_location + factory_pickup rows for every status=delivered + saleStatus=sold + zero-deliveries trailer (SO 6715, 6373, 6738, …)
          - seed-payroll-rates # idempotent: DeptDollarRate ($/point) for every production dept so the Weekly Payroll Report can convert points → gross pay
          - seed-report-test-data # idempotent: a few RPT-TEST- trailers with completed steps dated to the current week so the Admin Reports screen has rows to show
          - apply-trailer-model-stage-costs # one-shot: CREATE TABLE trailer_model_stage_costs (idempotent) — backs the Production Report's WIP cost
          - retag-audit-log-entity-types # one-shot: rewrite historical audit_logs entity_type so QC/batch rows surface in the mobile dropdown
          - qc-today-report # read-only: list every QC inspection submitted today (SO, dept, inspector)
          - dump-api-logs # diagnostic: print the last ~300 lines of the API container stdout (interceptor warnings, etc.)

concurrency:
  group: db-seed-prod
  cancel-in-progress: false

jobs:
  seed:
    name: Run ${{ inputs.script }}.ts on droplet
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: SSH in and run seed inside the api container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          command_timeout: 5m
          script: |
            set -euo pipefail
            SCRIPT="${{ inputs.script }}"

            # Special case: dump-api-logs prints the container's stdout via
            # `docker logs` from the host. There is no .ts script for it —
            # the api container's logs aren't reachable from inside the
            # container itself (PID 1's stdout is a pipe, not a file).
            if [ "$SCRIPT" = "dump-api-logs" ]; then
              echo "→ Dumping last 300 lines from bigfoot-api-api-1..."
              docker logs bigfoot-api-api-1 --tail 300 2>&1
              echo "✓ Log dump completed"
              exit 0
            fi

            echo "→ Running prisma/${SCRIPT}.ts inside bigfoot-api-api-1..."

            # tsx is fetched on-the-fly via npx (it's a devDep, not in the
            # prod image). The container already has DATABASE_URL +
            # DATABASE_SSL_CA_PATH from the env_file, and bcrypt + prisma
            # client are runtime deps so they're present.
            docker exec \
              -e NPM_CONFIG_UPDATE_NOTIFIER=false \
              bigfoot-api-api-1 \
              sh -c "cd /app && npx -y -p tsx@4 tsx prisma/${SCRIPT}.ts"

            echo "✓ Seed ${SCRIPT}.ts completed"
