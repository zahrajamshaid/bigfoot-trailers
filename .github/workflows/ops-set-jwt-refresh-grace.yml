name: Ops · Set JWT_REFRESH_REUSE_GRACE (manual)

# One-shot ops workflow — idempotently sets JWT_REFRESH_REUSE_GRACE in the
# droplet's .env.production, then recreates only the api container so it
# picks up the new value. The AuthService code defaults to 30s when the
# var is absent, so this workflow is for making the value explicit /
# changing it from the default.
#
# Trigger via: gh workflow run "Ops · Set JWT_REFRESH_REUSE_GRACE (manual)" \
#               --ref main --field value=30s

on:
  workflow_dispatch:
    inputs:
      value:
        description: 'Grace window duration (ms / s / m / h / d). Default 30s.'
        required: true
        default: '30s'

concurrency:
  group: ops-env-prod
  cancel-in-progress: false

jobs:
  set:
    name: Set ${{ inputs.value }} in .env.production
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: SSH in, patch env file, recreate api container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          envs: GRACE_VALUE
          script: |
            set -euo pipefail
            ENV_FILE=/opt/bigfoot/.env.production

            # The .env.production lives root-owned with restrictive perms so
            # secrets aren't readable by the deploy user. Use sudo for every
            # read + edit. (Deploys touch it via docker, which runs as root.)
            if ! sudo test -f "$ENV_FILE"; then
              echo "✗ $ENV_FILE missing — refusing to write." >&2
              exit 1
            fi

            echo "→ Current line (if any):"
            sudo grep '^JWT_REFRESH_REUSE_GRACE=' "$ENV_FILE" || echo "  (not set)"

            # Idempotent: replace the existing line if present, otherwise
            # insert after JWT_REFRESH_EXPIRY (or append if that's missing
            # too). The | sed delimiter avoids escaping problems with /.
            if sudo grep -q '^JWT_REFRESH_REUSE_GRACE=' "$ENV_FILE"; then
              sudo sed -i "s|^JWT_REFRESH_REUSE_GRACE=.*|JWT_REFRESH_REUSE_GRACE=${GRACE_VALUE}|" "$ENV_FILE"
              echo "→ Updated JWT_REFRESH_REUSE_GRACE → ${GRACE_VALUE}"
            elif sudo grep -q '^JWT_REFRESH_EXPIRY=' "$ENV_FILE"; then
              sudo sed -i "/^JWT_REFRESH_EXPIRY=/a JWT_REFRESH_REUSE_GRACE=${GRACE_VALUE}" "$ENV_FILE"
              echo "→ Inserted JWT_REFRESH_REUSE_GRACE=${GRACE_VALUE} after JWT_REFRESH_EXPIRY"
            else
              echo "JWT_REFRESH_REUSE_GRACE=${GRACE_VALUE}" | sudo tee -a "$ENV_FILE" > /dev/null
              echo "→ Appended JWT_REFRESH_REUSE_GRACE=${GRACE_VALUE}"
            fi

            echo "→ Verified line in env file:"
            sudo grep '^JWT_REFRESH_REUSE_GRACE=' "$ENV_FILE"

            cd /opt/bigfoot/bigfoot-api
            echo "→ Recreating api container with the new env..."
            docker compose --env-file /opt/bigfoot/.env.production \
              -f docker-compose.prod.yml up -d --force-recreate --no-deps api

            echo "→ Waiting briefly for container health..."
            sleep 5
            docker ps --filter name=bigfoot-api-api-1 --format 'table {{.Names}}\t{{.Status}}'

            echo "✓ Done."
        env:
          GRACE_VALUE: ${{ inputs.value }}
