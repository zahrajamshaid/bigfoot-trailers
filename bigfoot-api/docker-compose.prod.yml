###############################################################################
# BIGFOOT TRAILERS — Production stack
#
# Architecture:
#   Internet → Caddy (80/443, auto-TLS) → API (3000, internal) → Managed PG
#                                       ↘ Redis (internal, BullMQ)
#
# Database is DigitalOcean Managed PostgreSQL — NOT a container here. Set
# DATABASE_URL in .env.production to the PRIVATE VPC connection string with
# ?sslmode=require.
#
# Deploy on droplet:
#   cd /opt/bigfoot/bigfoot-api
#   docker compose --env-file /opt/bigfoot/.env.production \
#     -f docker-compose.prod.yml pull
#   docker compose --env-file /opt/bigfoot/.env.production \
#     -f docker-compose.prod.yml up -d
###############################################################################

services:
  # ---- Caddy: TLS termination + reverse proxy --------------------------------
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp' # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}
    depends_on:
      - api
    networks:
      - bigfoot

  # ---- API: NestJS image pulled from GHCR by CI ------------------------------
  # Image is built and pushed by .github/workflows/api-deploy.yml.
  # IMAGE_TAG is overridden by CI to a specific commit SHA for traceability.
  #
  # NOTE: env vars are loaded via `env_file:` (not `environment:` with ${VAR}
  # substitution) because Compose's interpolation mangles values that contain
  # `&` (treated as YAML anchor) or `WORD-WORD` patterns (treated as
  # ${VAR-default} shell default-value syntax) — e.g. our DB connection
  # string would lose `private-` and `&sslaccept=...`.
  api:
    image: ghcr.io/zahrajamshaid/bigfoot-trailers/bigfoot-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    expose:
      - '3000' # internal only — Caddy proxies in; nothing on the host
    env_file:
      - /opt/bigfoot/.env.production
    environment:
      # Hard-set so a stale .env from a previous deploy can't point the API
      # at a non-existent Postgres container.
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bigfoot
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -q -O /dev/null http://127.0.0.1:3000/health || exit 1',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ---- Redis: BullMQ queue + cache (internal only) ---------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--save', '60', '1', '--loglevel', 'warning']
    volumes:
      - redis_data:/data
    networks:
      - bigfoot
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  bigfoot:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  redis_data:
